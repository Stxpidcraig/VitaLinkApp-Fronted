<div class="especialidades-container">
  <div class="header">
    <h2>Gestión de Especialidades</h2>
    <button class="btn-nuevo" (click)="nuevo()">+ Nueva Especialidad</button>
  </div>

  <div class="buscador">
    <input type="text" [(ngModel)]="busqueda" placeholder="Buscar especialidad..." />
    <button class="btn-limpiar" (click)="limpiarBuscador()">Limpiar</button>
  </div>

  <div class="formulario">
    <h3>{{ modoEdicion ? 'Editar Especialidad' : 'Nueva Especialidad' }}</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="formulario.nombre" placeholder="Nombre" />
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" [(ngModel)]="formulario.descripcion" placeholder="Descripción" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-guardar" (click)="guardar()">Guardar</button>
      <button class="btn-cancelar" (click)="nuevo()">Cancelar</button>
    </div>
  </div>

  <table class="tabla">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let especialidad of especialidadesFiltradas">
        <td>{{ especialidad.nombre }}</td>
        <td>{{ especialidad.descripcion }}</td>
        <td>
          <button class="btn-editar" (click)="editar(especialidad)">Editar</button>
          <button class="btn-eliminar" (click)="eliminar(especialidad.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
